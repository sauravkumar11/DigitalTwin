version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: twincare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: twincare
      POSTGRES_PASSWORD: twincare
      POSTGRES_DB: twincare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twincare"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.15
    container_name: twincare-chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
    container_name: twincare-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://twincare:twincare@postgres:5432/twincare
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      CORS_ORIGINS: '["http://localhost:3000"]'
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    command: >
      sh -c "python -m app.seed.seed_data; uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    container_name: twincare-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  chroma_data:
  backend_uploads:
